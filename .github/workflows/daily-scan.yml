name: Daily ESG Compliance Scan

# Runs every day at 04:30 UTC = 10:00 AM IST, and can be run by hand from the Actions tab.
on:
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write   # lets the job save the updated data.json back to the repo

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Get the files
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run the ESG scan
        run: python scanner.py

      - name: Save any updates back to the site
        run: |
          git config user.name "esg-scan-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No changes today."
          else
            git commit -m "Daily ESG scan: $(date -u +%Y-%m-%d)"
            git push
            echo "Dashboard updated."
          fi
